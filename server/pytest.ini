[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
# Put the backend package root (the directory containing this file) on sys.path
# so `import api`, `controllers...`, etc. resolve regardless of how pytest is
# invoked (`pytest`, `python -m pytest`, or `pytest server` from the repo root).
pythonpath = .
# Run from the server/ directory. "." keeps collection scoped to the backend
# whether invoked from here or via `pytest server` at the repo root.
testpaths =
    .
python_files =
    test_*.py
    *_test.py
markers =
    unit: fast unit tests with mocked boundaries
    route: API route/contract tests (typically mocked DB/tasks)
    integration: tests requiring external services (db/redis/celery worker)
filterwarnings =
    # ignore all standard DeprecationWarnings
    ignore::DeprecationWarning

    # ignore the “general_plain_validator_function” deprecation
    ignore:.*general_plain_validator_function.*:DeprecationWarning

    # ignore the pkg_resources deprecation
    ignore:pkg_resources is deprecated as an API.*:DeprecationWarning

    # ignore websockets.legacy deprecation
    ignore:websockets\.legacy is deprecated.*:DeprecationWarning

    # ignore Pydantic’s class‐based Config deprecation
    ignore:Support for class-based `config` is deprecated.*:DeprecationWarning
