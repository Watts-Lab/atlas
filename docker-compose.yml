services:
  backend:
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - .env
    environment:
      - PYTHON_ENV=development
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

    volumes:
      - ./server:/app/api
      - ./server/papers:/app/api/papers
    command: >
      sh -c "python3 -m sanic api.app --host 0.0.0.0 --port 8000 --workers 1 --dev"
    depends_on:
      redis:
        condition: service_healthy

  client:
    container_name: client
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - 3000:80
    depends_on:
      - backend
    volumes:
      - ./client/dist:/usr/share/nginx/html
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    command: >
      sh -c "nginx -g 'daemon off;'"

  redis:
    container_name: redis
    image: public.ecr.aws/docker/library/redis:latest
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery_worker:
    container_name: celery_worker
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - .env
    environment:
      - PYTHON_ENV=development
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - C_FORCE_ROOT=false
      - CELERY_BROKER_CONNECTION_RETRY_ON_STARTUP=true
    volumes:
      - ./server:/app/api
      - ./server/papers:/app/api/papers
    # command: bash -c "celery -A workers.celery_config.celery worker --loglevel=INFO"
    command: bash -c "watchmedo auto-restart --directory=/app/api --pattern=*.py --recursive -- celery -A workers.celery_config.celery worker --loglevel=INFO --concurrency=1"
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

  celery_flower:
    container_name: celery_flower
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - .env
    environment:
      - PYTHON_ENV=development
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - C_FORCE_ROOT=false
    volumes:
      - ./server:/app/api
    # command: bash -c "celery -A workers.celery_config.celery flower --port=5555"
    entrypoint:
      - /bin/sh
      - ../start_flower.sh
    expose:
      - 5555
    ports:
      - 5556:5555
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started

  mcp_server:
    container_name: mcp_server
    build:
      context: .
      dockerfile: Dockerfile.mcp
    env_file:
      - .env
    environment:
      - PYTHON_ENV=development
      - ATLAS_API_URL=http://backend:8000/api/v1
      - MCP_HOST=0.0.0.0
      - MCP_PORT=9000
      - MCP_PATH=/mcp
    volumes:
      - ./atlas_mcp:/app/atlas_mcp
    command: >
      sh -c "watchmedo auto-restart --directory=/app/atlas_mcp --pattern=*.py --recursive -- python -m atlas_mcp.server"
    expose:
      - 9000
    depends_on:
      - backend
